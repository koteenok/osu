<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu! style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            cursor: crosshair;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff66aa;
            z-index: 100;
        }
        #combo {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: #66ccff;
            z-index: 100;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #ff88aa, #ff66aa, #cc4477);
            box-shadow: 0 0 20px #ff66aa, 0 0 40px rgba(255,102,170,0.5);
        }
        .circle.clicked {
            animation: clickAnim 0.2s ease-out forwards;
        }
        @keyframes clickAnim {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #start-screen h1 {
            font-size: 80px;
            color: #ff66aa;
            text-shadow: 0 0 30px #ff66aa;
            margin-bottom: 40px;
        }
        #start-btn {
            font-size: 28px;
            padding: 18px 50px;
            background: linear-gradient(135deg, #ff66aa, #ff4477);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="combo">x0</div>
    
    <div id="start-screen">
        <h1>osu!</h1>
        <button id="start-btn">Играть</button>
        <p style="color:#888;margin-top:20px;">Клик мышкой или Z / X</p>
    </div>

    <script>
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const startScreen = document.getElementById('start-screen');
        
        let score = 0;
        let combo = 0;
        let gameRunning = false;
        let keyPressed = false;
        let mouseX = 0;
        let mouseY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function spawnCircle() {
            if (!gameRunning) return;
            
            const size = 80;
            const x = 100 + Math.random() * (window.innerWidth - 200);
            const y = 150 + Math.random() * (window.innerHeight - 250);
            
            const circle = document.createElement('div');
            circle.className = 'circle';
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.left = x + 'px';
            circle.style.top = y + 'px';
            circle.style.position = 'absolute';
            circle.style.borderRadius = '50%';
            
            circle.addEventListener('click', () => hitCircle(circle));
            
            document.body.appendChild(circle);
            
            circle.dataset.time = Date.now();
            
            const timeoutId = setTimeout(() => {
                if (circle.parentNode) {
                    circle.remove();
                    combo = 0;
                    updateUI();
                    spawnCircle();
                }
            }, 2000);
            
            circle.dataset.timeout = timeoutId;
        }
        
        function hitCircle(circle) {
            if (circle.classList.contains('clicked')) return;
            
            clearTimeout(circle.dataset.timeout);
            
            circle.classList.add('clicked');
            combo++;
            score += 100 * combo;
            updateUI();
            setTimeout(() => circle.remove(), 200);
            spawnCircle();
        }
        
        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = 'x' + combo;
        }
        
        function tryHitWithKey() {
            if (keyPressed) return;
            keyPressed = true;
            
            const circles = document.querySelectorAll('.circle:not(.clicked)');
            let closest = null;
            let closestDist = Infinity;
            
            circles.forEach(circle => {
                const rect = circle.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const dist = Math.hypot(centerX - mouseX, centerY - mouseY);
                
                if (dist < closestDist && dist < 150) {
                    closestDist = dist;
                    closest = circle;
                }
            });
            
            if (closest) {
                hitCircle(closest);
            }
            
            setTimeout(() => keyPressed = false, 50);
        }
        
        function startGame() {
            score = 0;
            combo = 0;
            gameRunning = true;
            updateUI();
            spawnCircle();
        }
        
        document.getElementById('start-btn').addEventListener('click', () => {
            startScreen.style.display = 'none';
            startGame();
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'z' || e.key === 'Z' || e.key === 'x' || e.key === 'X') && gameRunning) {
                e.preventDefault();
                tryHitWithKey();
            }
        });
    </script>
</body>
</html>
